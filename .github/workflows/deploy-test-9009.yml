name: Deploy to Test Environment (Port 9009)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Update and Restart App (Port 9009)
        run: |
          # Separates Verzeichnis für die 9009-Instanz
          mkdir -p /home/systemv/multilang-9009
          cd /home/systemv/multilang-9009
          
          # Wir nutzen hier das Sprachenapp-Repo als Basis
          if [ ! -d ".git" ]; then
            git clone https://github.com/boernie77/Sprachenapp-Englisch-Italienisch.git .
          fi
          
          git fetch origin main
          git reset --hard origin/main
          
          # Port-Überschreibung via .env Datei
          echo "APP_PORT=9009" > .env
          echo "DB_PORT=5439" >> .env
          echo "DB_NAME=sprachen_db_9009" >> .env
          
          docker-compose down --remove-orphans
          docker-compose build --no-cache
          docker-compose up -d --force-recreate --remove-orphans
