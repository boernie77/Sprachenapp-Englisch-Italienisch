name: Deploy to Production (Live)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/hetzner_key
          chmod 600 ~/.ssh/hetzner_key
          ssh-keyscan -H 178.104.130.161 >> ~/.ssh/known_hosts

      - name: Deploy to Hetzner
        env:
          DB_PASSWORD_LIVE: ${{ secrets.DB_PASSWORD_LIVE }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          ssh -i ~/.ssh/hetzner_key root@178.104.130.161 bash -s << EOF
            cd /opt/lernapp

            # Repo aktualisieren
            git remote set-url origin https://github.com/boernie77/Sprachenapp-Englisch-Italienisch.git
            git clean -fd
            git fetch origin main
            git reset --hard origin/main

            # Umgebungsvariablen für Live
            PROJECT_NAME="lernapp"
            APP_PORT=9011
            DB_PORT=5436
            DB_NAME=italian_db

            # Sicherstellen, dass das pgdata-Verzeichnis existiert (Bind-Mount)
            mkdir -p pgdata

            # .env Datei für Docker Compose erstellen (Secrets kommen aus GitHub)
            echo "APP_PORT=\$APP_PORT" > .env
            echo "DB_PORT=\$DB_PORT" >> .env
            echo "DB_NAME=\$DB_NAME" >> .env
            echo "DB_PASSWORD=${DB_PASSWORD_LIVE}" >> .env
            echo "JWT_SECRET=${JWT_SECRET}" >> .env
            echo "SMTP_PASS=${SMTP_PASS}" >> .env

            # AGGRESSIVER CLEANUP: Stoppe alles, was Port belegt
            CONF_CONTAINER=\$(docker ps --filter "publish=\$APP_PORT" -q)
            if [ ! -z "\$CONF_CONTAINER" ]; then
              echo "Stoppe kollidierenden Container auf Port \$APP_PORT: \$CONF_CONTAINER"
              docker stop \$CONF_CONTAINER || true
              docker rm \$CONF_CONTAINER || true
            fi

            # Normaler Projekt-Cleanup
            docker-compose -p \$PROJECT_NAME down --remove-orphans || true

            # AGGRESSIVER CACHE CLEAR: Lösche das alte Image explizit
            docker rmi lernapp-app:latest || true
            docker image prune -a -f --filter "label=com.docker.compose.project=\$PROJECT_NAME" || true

            docker-compose -p \$PROJECT_NAME build --no-cache
            docker-compose -p \$PROJECT_NAME up -d --force-recreate --remove-orphans
          EOF
