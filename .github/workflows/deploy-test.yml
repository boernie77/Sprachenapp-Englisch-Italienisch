name: Deploy to Test Environment (Automated Port 9009)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Update and Restart App (Port 9009)
        run: |
          # Separates Verzeichnis für die 9009-Instanz
          mkdir -p /home/systemv/multilang-9009
          cd /home/systemv/multilang-9009
          
          # Wir nutzen hier das Sprachenapp-Repo als Basis (Gold-Repo)
          if [ ! -d ".git" ]; then
            git clone https://github.com/boernie77/Sprachenapp-Englisch-Italienisch.git .
          fi
          
          git fetch origin main
          git reset --hard origin/main
          
          # Umgebungsvariablen für Test 9009
          PROJECT_NAME="multilang-9009"
          export APP_PORT=9009
          export DB_PORT=5439
          export DB_NAME=multilang_9009_db
          export DB_VOLUME=multilang_9009_data
          
          # Sicherstellen, dass das Volume existiert
          docker volume create $DB_VOLUME || true
          
          # .env Datei für Docker Compose erstellen
          echo "APP_PORT=$APP_PORT" > .env
          echo "DB_PORT=$DB_PORT" >> .env
          echo "DB_NAME=$DB_NAME" >> .env
          echo "DB_VOLUME=$DB_VOLUME" >> .env
          
          # Robuster Cleanup vor dem Start (verhindert Name-Conflicts)
          docker-compose -p $PROJECT_NAME down --remove-orphans || true
          
          docker-compose -p $PROJECT_NAME build --no-cache
          docker-compose -p $PROJECT_NAME up -d --force-recreate --remove-orphans
