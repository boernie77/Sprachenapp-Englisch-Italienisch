name: Deploy to Test Environment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Update and Restart App (Test)
        run: |
          mkdir -p /home/systemv/multilang-test
          cd /home/systemv/multilang-test
          
          if [ ! -d ".git" ]; then
            git clone https://github.com/boernie77/Sprachenapp-Englisch-Italienisch.git .
          fi
          
          git fetch origin main
          git reset --hard origin/main
          
          # Umgebungsvariablen für Test 9011
          export APP_PORT=9011
          export DB_PORT=5436
          export DB_NAME=multilang_test_db
          export DB_VOLUME=multilang_test_data
          
          # Sicherstellen, dass das Volume existiert
          docker volume create $DB_VOLUME || true
          
          # .env Datei für Docker Compose erstellen
          echo "APP_PORT=$APP_PORT" > .env
          echo "DB_PORT=$DB_PORT" >> .env
          echo "DB_NAME=$DB_NAME" >> .env
          echo "DB_VOLUME=$DB_VOLUME" >> .env
          
          docker-compose down --remove-orphans
          docker-compose build --no-cache
          docker-compose up -d --force-recreate --remove-orphans
